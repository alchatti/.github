name: Reusable Docker Build And Push

'on':
  workflow_call:
    inputs:
      context:
        required: true
        type: string
      dockerfile:
        required: true
        type: string
      platforms:
        required: false
        type: string
        default: linux/amd64,linux/arm64
      build_args:
        required: false
        type: string
        default: ""
      tags:
        required: true
        type: string
      push:
        required: false
        type: boolean
        default: true
      cache_from:
        required: false
        type: string
        default: type=gha
      cache_to:
        required: false
        type: string
        default: type=gha,mode=max
      target:
        required: false
        type: string
        default: ""
      # Optional image test
      test_command:
        required: false
        type: string
        default: ""
      test_platform:
        required: false
        type: string
        default: linux/amd64
      test_image_tag:
        required: false
        type: string
        default: local/test-image:ci
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

jobs:
  docker-build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          # Disables the cache lookup to stop parallel job collisions
          cache-image: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build a local image only when a test command is supplied.
      # This is intentionally single-platform because load:true loads the image
      # into the local Docker engine for docker run / docker exec tests.
      - name: Build image for local test
        if: ${{ inputs.test_command != '' }}
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.test_platform }}
          build-args: ${{ inputs.build_args }}
          push: false
          load: true
          cache-from: ${{ inputs.cache_from }}
          tags: ${{ inputs.test_image_tag }}
          target: ${{ inputs.target }}

      - name: Test local image
        if: ${{ inputs.test_command != '' }}
        shell: bash
        env:
          IMAGE: ${{ inputs.test_image_tag }}
        run: |
          set -euo pipefail
          echo "Testing image: ${IMAGE}"
          ${{ inputs.test_command }}

      # Real build and push. This can still be multi-platform.
      # It runs only after the optional test passes.
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          build-args: ${{ inputs.build_args }}
          push: ${{ inputs.push }}
          cache-from: ${{ inputs.cache_from }}
          cache-to: ${{ inputs.cache_to }}
          tags: ${{ inputs.tags }}
          target: ${{ inputs.target }}
          sbom: true
          provenance: mode=max
